services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tally
      POSTGRES_PASSWORD: tally
      POSTGRES_DB: tally
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tally -d tally"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/ledger/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://tally:tally@postgres:5432/tally?sslmode=disable"
      - "up"

  redpanda:
    image: redpandadata/redpanda:v24.1.11
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20

  ledger:
    build:
      context: .
      args:
        SERVICE_PATH: services/ledger/cmd/ledger
    environment:
      DATABASE_URL: postgres://tally:tally@postgres:5432/tally?sslmode=disable
      LEDGER_GRPC_ADDR: ":9090"
      KAFKA_BROKERS: "redpanda:9092"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy

  fraud:
    build:
      context: ./services/fraud
    environment:
      DATABASE_URL: postgres://tally:tally@postgres:5432/tally?sslmode=disable
      KAFKA_BROKERS: "redpanda:9092"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy

  gateway:
    build:
      context: .
      args:
        SERVICE_PATH: services/gateway
    environment:
      LEDGER_GRPC_ADDR: "ledger:9090"
      GATEWAY_HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      - ledger

  web:
    build:
      context: ./web
    environment:
      API_URL: "http://gateway:8080"
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  pgdata:
