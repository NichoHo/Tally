# Kubernetes manifests for the ledger service. Included to show deployment
# awareness; local development uses docker-compose (see the README).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger
  labels:
    app: ledger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger
  template:
    metadata:
      labels:
        app: ledger
    spec:
      containers:
        - name: ledger
          image: tally/ledger:latest
          ports:
            - containerPort: 9090
              name: grpc
          env:
            - name: LEDGER_GRPC_ADDR
              value: ":9090"
            - name: KAFKA_BROKERS
              value: "redpanda:9092"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ledger-db
                  key: database-url
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ledger
spec:
  selector:
    app: ledger
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
