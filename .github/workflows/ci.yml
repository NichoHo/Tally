name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tally
          POSTGRES_PASSWORD: tally
          POSTGRES_DB: tally_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tally -d tally_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build and vet
        run: |
          go build ./...
          go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
      - name: Test (includes invariant, idempotency, concurrency suites)
        env:
          TEST_DATABASE_URL: postgres://tally:tally@localhost:5432/tally_test?sslmode=disable
        run: go test -race -count=1 ./...

  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tally
          POSTGRES_PASSWORD: tally
          POSTGRES_DB: tally_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tally -d tally_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: services/fraud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -r requirements.txt pytest ruff
      - name: Lint
        run: ruff check .
      - name: Test (includes duplicate-event dedupe)
        env:
          TEST_DATABASE_URL: postgres://tally:tally@localhost:5432/tally_test?sslmode=disable
        run: python -m pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build (type checks)
        run: npm run build
